<script type="module" src="/components/umami-page.js"></script>

<umami-page
  title="🌤️ Climat & Météo"
  description="Données de vigilance météorologique et indicateurs climatiques pour mieux anticiper les phénomènes naturels sur le territoire.">


  <!-- BLOC 1 : Indicateurs clés de vigilance météo -->
  <section class="obs-section">
    <h2>Indicateurs — Vigilance météorologique</h2>

    <div class="obs-kpis">
      <umami-context
        context="ctx,ctx1"
        ctx-domain="public.opendatasoft.com"
        ctx-dataset="weatherref-france-vigilance-meteo-departement"
        ctx1-domain="public.opendatasoft.com"
        ctx1-dataset="weatherref-france-vigilance-meteo-departement"
      >
        <umami-aggregation context="ctx"  field="phenomenon_id" operation="count"></umami-aggregation>
        <umami-aggregation context="ctx1" field="color_id"      operation="avg"></umami-aggregation>
      </umami-context>
    </div>
  </section>


  <!-- BLOC 2 : Répartition des phénomènes par couleur d'alerte -->
  <section class="obs-section">
    <h2>Répartition des alertes par phénomène</h2>

    <div class="obs-chart-wrapper">
      <umami-context
        context="ctx"
        ctx-domain="public.opendatasoft.com"
        ctx-dataset="weatherref-france-vigilance-meteo-departement"
      >
        <umami-filter context="ctx" field="phenomenon_max_color_id"></umami-filter>
        <umami-chart  context="ctx" type="bar" x="phenomenon_id" y="color_id" operation="count"></umami-chart>
      </umami-context>
    </div>
  </section>


  <!-- BLOC 3 : Évolution temporelle des vigilances -->
  <section class="obs-section">
    <h2>Évolution des vigilances dans le temps</h2>

    <div class="obs-chart-wrapper">
      <umami-context
        context="ctx"
        ctx-domain="public.opendatasoft.com"
        ctx-dataset="weatherref-france-vigilance-meteo-departement"
      >
        <umami-chart context="ctx" type="line" x="validity_period_time_start" y="phenomenon_id" operation="count"></umami-chart>
      </umami-context>
    </div>
  </section>


</umami-page>
