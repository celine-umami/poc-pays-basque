<script type="module" src="/components/umami-page.js"></script>

<umami-page
  title="🌳 Arbres Remarquables"
  description="Espèces, circonférences et répartition géographique des arbres remarquables répertoriés sur le territoire.">

  <!-- ============================================================
       CONTENU DE LA PAGE

       Pour ajouter un bloc, copiez-collez une <section> complète.
       Chaque bloc contient :
         - un <umami-context> avec le domaine et le dataset
         - un ou plusieurs composants (<umami-aggregation>, <umami-chart>, etc.)

       Attributs utiles sur <umami-context> :
         ctx-domain   → domaine de la plateforme (ex: data.paysbaque.fr)
         ctx-dataset  → identifiant du jeu de données

       Attributs utiles sur <umami-chart> :
         type         → type de graphique : "line", "bar", "pie"
         x            → champ pour l'axe horizontal
         y            → champ pour l'axe vertical
         operation    → calcul : "sum", "count", "avg", "min", "max"

       Attributs utiles sur <umami-aggregation> :
         field        → champ à agréger
         operation    → calcul : "sum", "count", "avg", "min", "max"

       Attributs utiles sur <umami-filter> :
         field        → champ sur lequel filtrer (crée un menu déroulant)
       ============================================================ -->


  <!-- BLOC 1 : Indicateurs (chiffres clés) -->
  <section class="obs-section">
    <h2>Agrégations — Vigilance météo</h2>

    <div class="obs-kpis">
      <umami-context
        context="ctx,ctx1"
        ctx-domain="public.opendatasoft.com"
        ctx-dataset="weatherref-france-vigilance-meteo-departement"
        ctx1-domain="public.opendatasoft.com"
        ctx1-dataset="weatherref-france-vigilance-meteo-departement"
      >
        <umami-aggregation context="ctx"  field="phenomenon_id" operation="sum"></umami-aggregation>
        <umami-aggregation context="ctx1" field="color_id"      operation="sum"></umami-aggregation>
      </umami-context>
    </div>
  </section>


  <!-- BLOC 2 : Graphique avec filtre -->
  <section class="obs-section">
    <h2>Circonférence par espèce — Arbres remarquables de Paris</h2>

    <div class="obs-chart-wrapper">
      <umami-context
        context="ctx"
        ctx-domain="documentation-resources.opendatasoft.com"
        ctx-dataset="les-arbres-remarquables-de-paris"
      >
        <umami-filter context="ctx" field="arrondissement"></umami-filter>
        <umami-chart  context="ctx" type="line" x="espece" y="circonference_en_cm"></umami-chart>
      </umami-context>
    </div>
  </section>


  <!-- BLOC EXEMPLE (commenté) : Copier et décommenter pour ajouter un bloc

    </div>

</umami-page>
